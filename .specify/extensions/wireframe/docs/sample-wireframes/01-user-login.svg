    <text x="640" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1f2937">Sign in</text>
    <text x="414" y="265" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Email</text>
    <rect x="414" y="275" width="452" height="44" rx="6" fill="#ffffff" stroke="#b8a080"/>
    <text x="426" y="303" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">you@example.com</text>
    <g transform="translate(886, 287)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text></g>
    <text x="414" y="345" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Password</text>
    <rect x="414" y="355" width="452" height="44" rx="6" fill="#ffffff" stroke="#b8a080"/>
    <text x="426" y="383" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</text>
    <rect x="414" y="418" width="452" height="48" rx="6" fill="#8b5cf6"/>
    <text x="640" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Sign in</text>
    <text x="640" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#2563eb" text-decoration="underline">Forgot password?</text>
    <g transform="translate(760, 495)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text></g>
