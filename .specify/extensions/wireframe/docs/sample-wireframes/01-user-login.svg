      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">Enter credentials and sign in</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#374151">As a returning user, I enter email + password and click Sign in.</text>
      <rect x="40" y="44" width="60" height="22" rx="4" fill="#0891b2"/>
      <text x="70" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">US-001</text>
      <rect x="106" y="44" width="60" height="22" rx="4" fill="#2563eb"/>
      <text x="136" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">FR-001</text>
      <rect x="172" y="44" width="60" height="22" rx="4" fill="#ea580c"/>
      <text x="202" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">SC-001</text>
    </g>
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">Recover forgotten password</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#374151">As a user who forgot, I click the link and land on the reset form.</text>
      <rect x="40" y="44" width="60" height="22" rx="4" fill="#0891b2"/>
      <text x="70" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">US-002</text>
      <rect x="106" y="44" width="60" height="22" rx="4" fill="#2563eb"/>
      <text x="136" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">FR-004</text>
    </g>
  </g>

  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">001:01 | User Login | SpecKit</text>
