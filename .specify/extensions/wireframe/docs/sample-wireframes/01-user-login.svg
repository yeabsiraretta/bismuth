    <text x="180" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Sign in</text>
    <text x="180" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#2563eb" text-decoration="underline">Forgot password?</text>
    <g transform="translate(256, 434)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text></g>
    <rect x="0" y="664" width="360" height="56" rx="24" fill="#dcc8a8"/>
