<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg-dark)"/>

  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#94a3b8" letter-spacing="1">
    USER LOGIN - AUTHENTICATION FLOW
  </text>

  <g id="diagram" transform="translate(40, 60)">
    <rect width="1840" height="700" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- Client -->
    <g transform="translate(80, 80)">
      <rect width="220" height="100" rx="8" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
      <text x="110" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">Browser</text>
      <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Login form</text>
      <text x="110" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">email + password</text>
      <g transform="translate(200, -10)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text></g>
    </g>

    <!-- API -->
    <g transform="translate(480, 80)">
      <rect width="220" height="100" rx="8" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
      <text x="110" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">Auth API</text>
      <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">POST /login</text>
      <text x="110" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Rate-limit per IP</text>
      <g transform="translate(200, -10)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text></g>
    </g>

    <!-- DB -->
    <g transform="translate(880, 80)">
      <rect width="220" height="100" rx="8" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
      <text x="110" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">User DB</text>
      <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">bcrypt compare</text>
      <text x="110" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Row-level security</text>
      <g transform="translate(200, -10)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">3</text></g>
    </g>

    <!-- JWT / Session -->
    <g transform="translate(1280, 80)">
      <rect width="220" height="100" rx="8" fill="#334155" stroke="#22c55e" stroke-width="2"/>
      <text x="110" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">JWT Issue</text>
      <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">HS256 signed</text>
      <text x="110" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">httpOnly cookie</text>
      <g transform="translate(200, -10)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">4</text></g>
    </g>

    <!-- Arrows: Browser → API → DB → JWT -->
    <line x1="300" y1="130" x2="480" y2="130" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="700" y1="130" x2="880" y2="130" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="1100" y1="130" x2="1280" y2="130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

    <!-- Dashboard redirect -->
    <g transform="translate(680, 280)">
      <rect width="240" height="80" rx="8" fill="#334155" stroke="#22c55e" stroke-width="2"/>
      <text x="120" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">Dashboard</text>
      <text x="120" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">302 redirect on success</text>
      <g transform="translate(220, -10)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">5</text></g>
    </g>

    <!-- Error path -->
    <g transform="translate(480, 280)">
      <rect width="160" height="80" rx="8" fill="#334155" stroke="#ef4444" stroke-width="2"/>
      <text x="80" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">401 Invalid</text>
      <text x="80" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Preserve email</text>
      <g transform="translate(140, -10)"><circle r="14" fill="#dc2626"/><text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">6</text></g>
    </g>

    <!-- Arrows from JWT → Dashboard, from DB → Error -->
    <line x1="1390" y1="180" x2="900" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
    <line x1="990" y1="180" x2="590" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#1e293b" stroke="#475569"/>

    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">Browser submits credentials</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Form POST over HTTPS. Email preserved on error.</text>
      <rect x="40" y="44" width="60" height="22" rx="4" fill="#0891b2"/>
      <text x="70" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">US-001</text>
      <rect x="106" y="44" width="60" height="22" rx="4" fill="#2563eb"/>
      <text x="136" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">FR-001</text>
    </g>

    <g transform="translate(480, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">Auth API with rate-limiting</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Blocks brute-force attempts per IP.</text>
      <rect x="40" y="44" width="60" height="22" rx="4" fill="#2563eb"/>
      <text x="70" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">FR-005</text>
    </g>

    <g transform="translate(940, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">3</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">Credential check</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">bcrypt compare; RLS on users table.</text>
      <rect x="40" y="44" width="60" height="22" rx="4" fill="#2563eb"/>
      <text x="70" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">FR-002</text>
    </g>

    <g transform="translate(1400, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">4</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">JWT issue on success</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">httpOnly cookie, 2s p95 (SC-001).</text>
      <rect x="40" y="44" width="60" height="22" rx="4" fill="#ea580c"/>
      <text x="70" y="59" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">SC-001</text>
    </g>
  </g>

  <text x="40" y="1060" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">001:02 | User Login | SpecKit</text>
</svg>
