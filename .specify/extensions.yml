installed:
- architecture-guard
- changelog
- fix-findings
- git
- memory-loader
- memory-md
- security-review
- wireframe
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before planning
    condition: null
  - extension: wireframe
    command: speckit.wireframe.review
    enabled: true
    optional: true
    prompt: Review and sign off wireframes before planning? (signed-off wireframes
      become spec constraints)
    description: Ensure wireframes are reviewed and signed off before plan is written
    condition: null
  - extension: memory-md
    command: speckit.memory-md.plan-with-memory
    enabled: true
    optional: true
    prompt: Would you like to synthesize project memory before planning?
    description: ''
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before implementation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: changelog
    command: speckit.changelog.generate
    enabled: true
    optional: true
    prompt: Generate changelog entry from this spec?
    description: Update CHANGELOG.md with new spec additions
    condition: null
  - extension: wireframe
    command: speckit.wireframe.generate
    enabled: true
    optional: true
    prompt: Generate wireframes for this feature now?
    description: Offer wireframe generation after spec creation
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.violation-detection
    enabled: true
    optional: true
    prompt: Would you like to scan the technical plan for architectural drift and
      Constitution violations?
    description: ''
    condition: null
  - extension: security-review
    command: speckit.security-review.plan
    enabled: true
    optional: true
    prompt: Would you like to perform a security review on the proposed technical
      plan?
    description: ''
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.refactor-generator
    enabled: true
    optional: true
    prompt: Would you like to generate architectural refactor tasks before implementation?
    description: ''
    condition: null
  - extension: security-review
    command: speckit.security-review.tasks
    enabled: true
    optional: true
    prompt: Would you like to verify that security boundaries are represented in the
      tasks?
    description: ''
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: changelog
    command: speckit.changelog.release
    enabled: true
    optional: true
    prompt: Generate release notes and bump version?
    description: Update CHANGELOG.md, bump version, and sync About page
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.architecture-review
    enabled: true
    optional: true
    prompt: Would you like to run a post-implementation architecture review?
    description: ''
    condition: null
  - extension: wireframe
    command: speckit.wireframe.screenshots
    enabled: true
    optional: true
    prompt: Capture implementation screenshots and compare to signed-off wireframes?
    description: 'Regression check: compare implementation to approved wireframes'
    condition: null
  - extension: memory-md
    command: speckit.memory-md.capture-from-diff
    enabled: true
    optional: true
    prompt: Would you like to capture durable lessons from this implementation to
      project memory?
    description: ''
    condition: null
  - extension: security-review
    command: speckit.security-review.branch
    enabled: true
    optional: true
    prompt: Would you like to scan the new implementation for security vulnerabilities?
    description: ''
    condition: null
  - extension: fix-findings
    command: speckit.fix-findings.run
    enabled: true
    optional: true
    prompt: Run fix-findings to analyze and resolve spec findings automatically?
    description: Post-implementation automated finding resolution
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
