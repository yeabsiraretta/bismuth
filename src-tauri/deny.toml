# cargo-deny configuration for Bismuth
# Checks licenses, advisories, bans, and sources.
# Run: cargo deny check (or via CI)
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# ── Advisories ──────────────────────────────────────────────────────────────
[advisories]
# RUSTSEC advisory database
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail CI on any known vulnerability
vulnerability = "deny"
# Warn on unmaintained crates
unmaintained = "warn"
# Warn on yanked versions
yanked = "warn"
notice = "warn"

# ── Licenses ────────────────────────────────────────────────────────────────
[licenses]
# Bismuth is MIT-licensed; allow compatible licenses
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
]
# Copyleft licenses that are incompatible with MIT distribution
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
]
copyleft = "warn"
default = "deny"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ── Bans ────────────────────────────────────────────────────────────────────
[bans]
# Warn on multiple versions of the same crate (indicates bloat)
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ── Sources ─────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
