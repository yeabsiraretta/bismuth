[package]
name = "bismuth"
version = "0.0.1"
description = "A local-first PKM editor with Johnny.Decimal, Zettelkasten, and intelligent knowledge management"
authors = ["Yeabsira Moges <yeabsiraretta@proton.me>"]
license = "MIT"
repository = "https://github.com/yeabsiraretta/bismuth"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
notify = "6.0"
git2 = "0.18"
tokio = { version = "1.0", features = ["full"] }
rusqlite = { version = "0.31", features = ["bundled"] }
yaml-rust = "0.4"
regex = "1.10"
lopdf = "0.32"

[features]
# This feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
