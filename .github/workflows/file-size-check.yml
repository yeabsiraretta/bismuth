name: File Size Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  check-file-sizes:
    name: Enforce 300-line limit (Constitution VI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run file size checker
        run: bash scripts/check-file-sizes.sh

      - name: Comment on PR (if failed)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **File Size Check Failed**\n\nOne or more files exceed the 300-line limit required by Constitution Principle VI.\n\nPlease refactor large files into smaller, focused modules. See `docs/file-size-violations.md` for guidance.\n\nRun `pnpm check:file-sizes` locally to see which files need refactoring.'
            })
