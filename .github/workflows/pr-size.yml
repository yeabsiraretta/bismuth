name: PR Size Guard

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check diff size
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          ADDED=$(git diff --stat "$BASE" "$HEAD" | tail -1 | grep -oP '\d+ insertion' | grep -oP '^\d+' || echo "0")
          DELETED=$(git diff --stat "$BASE" "$HEAD" | tail -1 | grep -oP '\d+ deletion' | grep -oP '^\d+' || echo "0")
          FILES=$(git diff --name-only "$BASE" "$HEAD" | wc -l)
          TOTAL=$((ADDED + DELETED))

          echo "## PR Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files changed | $FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines added | +$ADDED |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines deleted | -$DELETED |" >> $GITHUB_STEP_SUMMARY
          echo "| Total churn | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Warn if PR is large (>500 lines changed)
          if [ "$TOTAL" -gt 1000 ]; then
            echo "⚠️ **Large PR** — consider splitting into smaller PRs for easier review." >> $GITHUB_STEP_SUMMARY
            echo "::warning::PR has $TOTAL lines of churn. Consider splitting."
          elif [ "$TOTAL" -gt 500 ]; then
            echo "📋 Medium-sized PR — reviewable but keep an eye on scope." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ PR size is good." >> $GITHUB_STEP_SUMMARY
          fi

          # Hard fail on enormous PRs (>3000 lines)
          if [ "$TOTAL" -gt 3000 ]; then
            echo "::error::PR has $TOTAL lines of churn (>3000). Must be split."
            exit 1
          fi
